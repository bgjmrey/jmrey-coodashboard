<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMREY · Clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --jmrey-navy-900:#0E1F3D;--jmrey-navy-800:#14274A;--jmrey-navy-700:#1E3157;
  --jmrey-gold-700:#A47535;--jmrey-gold-600:#B6884A;--jmrey-gold-300:#D7B27A;
  --jmrey-ivory-50:#FAF7F2;--jmrey-ivory-100:#F3F0EA;--jmrey-ivory-200:#ECE7DD;--jmrey-ivory-300:#E2D9C6;
  --jmrey-ink-900:#14171C;--jmrey-ink-500:#5A5A5A;--jmrey-ink-400:#7A7669;--jmrey-ink-200:#D9D2C2;--jmrey-paper:#FFFFFF;
  --bg:var(--jmrey-ivory-100);--bg-elevated:var(--jmrey-ivory-50);--bg-card:var(--jmrey-paper);--bg-dark:var(--jmrey-navy-900);
  --fg-1:var(--jmrey-navy-900);--fg-2:var(--jmrey-ink-900);--fg-3:var(--jmrey-ink-500);--fg-4:var(--jmrey-ink-400);
  --fg-on-dark:#F4ECE0;--fg-on-dark-2:#B6884A;
  --accent:var(--jmrey-gold-600);--accent-soft:var(--jmrey-gold-300);
  --border:var(--jmrey-ink-200);--border-soft:var(--jmrey-ivory-300);
  --radius-md:6px;--radius-lg:10px;--radius-xl:14px;
  --shadow-sm:0 2px 6px rgba(20,23,28,.05),0 1px 2px rgba(20,23,28,.04);
  --shadow-md:0 8px 24px -8px rgba(20,23,28,.10),0 2px 6px rgba(20,23,28,.04);
  --font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Manrope',system-ui,sans-serif;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--space-7:48px;--space-8:64px;
  --container:1240px;--gutter:clamp(20px,4vw,56px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg-2);line-height:1.6;}
h1,h2{font-family:var(--font-serif);font-weight:500;letter-spacing:-0.01em;line-height:1.08;color:var(--fg-1);}
.wrap{max-width:var(--container);margin:0 auto;padding:0 var(--gutter);}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}

.topbar{background:var(--bg-dark);padding:16px 0;}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;}
.topbar .brand{font-family:var(--font-serif);font-size:22px;color:var(--fg-on-dark);text-decoration:none;}
.topbar .back{font-size:13px;color:var(--fg-on-dark-2);text-decoration:none;transition:color 160ms;}
.topbar .back:hover{color:var(--fg-on-dark);}

.page-header{padding:var(--space-7) 0 var(--space-6);border-bottom:1px solid var(--border-soft);}
.page-header h1{font-size:clamp(32px,4vw,48px);margin-top:var(--space-3);}
.rule{width:48px;height:2px;background:var(--accent);border:none;margin:var(--space-4) 0 0;}

.toolbar{display:flex;align-items:center;gap:var(--space-4);margin:var(--space-6) 0 var(--space-5);flex-wrap:wrap;}
.search-input{padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-lg);font-family:var(--font-sans);font-size:14px;background:var(--bg-card);color:var(--fg-2);outline:none;transition:border-color 160ms;min-width:260px;}
.search-input:focus{border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--radius-md);padding:9px 18px;font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;transition:background 160ms;}
.btn-primary{background:var(--jmrey-navy-900);color:var(--fg-on-dark);}
.btn-primary:hover{background:var(--jmrey-navy-700);}
.btn-sm{padding:6px 12px;font-size:12px;}

.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-4);padding-bottom:var(--space-8);}

.client-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);cursor:pointer;text-decoration:none;display:block;transition:box-shadow 220ms cubic-bezier(.16,1,.3,1),border-color 220ms,transform 220ms;}
.client-card:hover{box-shadow:var(--shadow-md);border-color:var(--accent-soft);transform:translateY(-2px);}
.card-icon{width:44px;height:44px;background:var(--jmrey-navy-900);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:var(--space-3);}
.card-eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.card-name{font-family:var(--font-serif);font-size:20px;font-weight:500;color:var(--fg-1);margin-bottom:var(--space-2);}
.card-meta{font-size:12px;color:var(--fg-4);display:flex;flex-direction:column;gap:2px;}
.card-arrow{margin-top:var(--space-4);font-size:18px;color:var(--accent-soft);transition:color 160ms;}
.client-card:hover .card-arrow{color:var(--accent);}

/* Estado vacío y carga */
.state-msg{text-align:center;padding:var(--space-8) 0;color:var(--fg-3);}
.state-msg .icon{font-size:36px;margin-bottom:var(--space-3);}
.state-msg p{font-size:15px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal nuevo cliente */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(14,31,61,.35);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg-card);border-radius:var(--radius-xl);padding:var(--space-6);max-width:480px;width:94vw;box-shadow:0 24px 48px -16px rgba(14,31,61,.25);}
.modal h3{font-family:var(--font-serif);font-size:22px;margin-bottom:var(--space-4);}
.fi{display:flex;flex-direction:column;gap:6px;margin-bottom:var(--space-4);}
.fi label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-3);}
.fi input,.fi select{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-sans);font-size:14px;color:var(--fg-2);background:var(--bg-card);outline:none;transition:border-color 160ms;}
.fi input:focus,.fi select:focus{border-color:var(--accent);}
.modal-footer{display:flex;gap:var(--space-3);justify-content:flex-end;margin-top:var(--space-5);}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--fg-2);}
.btn-ghost:hover{border-color:var(--accent);}

.view-btn{background:var(--bg-card);border:none;padding:7px 12px;font-size:15px;cursor:pointer;color:var(--fg-3);transition:background 140ms,color 140ms;}
.view-btn:hover{background:var(--jmrey-ivory-200);color:var(--fg-1);}
.view-btn.active{background:var(--jmrey-navy-900);color:var(--fg-on-dark);}

/* List view table */
.list-table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:var(--space-8);}
.list-table thead th{background:var(--bg-dark);color:var(--fg-on-dark);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;text-align:left;padding:10px 14px;}
.list-table thead th.r{text-align:right;}
.list-table tbody td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--border-soft);color:var(--fg-2);}
.list-table tbody td.r{text-align:right;font-variant-numeric:tabular-nums;}
.list-table tbody tr:hover td{background:var(--jmrey-ivory-200);}
.list-table tbody tr:last-child td{border-bottom:none;}
.list-table .link-cell a{color:var(--accent);text-decoration:none;font-weight:600;}
.list-table .link-cell a:hover{text-decoration:underline;}
.filter-row-list th{background:var(--jmrey-navy-800)!important;padding:4px 8px!important;}
.filter-row-list input{width:100%;padding:4px 8px;border:1px solid rgba(255,255,255,.15);border-radius:4px;background:rgba(255,255,255,.08);color:#fff;font-size:12px;font-family:var(--font-sans);outline:none;}
.filter-row-list input::placeholder{color:rgba(255,255,255,.35);}
.filter-row-list input:focus{border-color:var(--accent);}
footer{background:var(--bg-dark);padding:var(--space-5) 0;margin-top:var(--space-7);}
footer .wrap{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(180,136,74,.3);padding-top:var(--space-4);}
footer .brand{color:var(--fg-on-dark);font-family:var(--font-serif);font-size:18px;}
footer .fnote{font-size:12px;color:var(--fg-on-dark-2);}
</style>
</head>
<body>

<nav class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html">JMREY</a>
    <a class="back" href="index.html">← Portal</a>
  </div>
</nav>

<div class="page-header">
  <div class="wrap">
    <div class="eyebrow">JMREY GROUP</div>
    <h1>Clientes</h1>
    <hr class="rule">
  </div>
</div>

<div class="wrap">
  <div class="toolbar">
    <input type="text" class="search-input" id="search" placeholder="Buscar cliente o partner…" oninput="render()">
    <div style="display:flex;gap:4px;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;">
      <button id="btn-cards" class="view-btn active" onclick="setView('cards')" title="Tarjetas">⊞</button>
      <button id="btn-list"  class="view-btn"        onclick="setView('list')"  title="Lista">☰</button>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Nuevo cliente</button>
  </div>
  <div class="clients-grid" id="grid">
    <div class="state-msg" style="grid-column:1/-1;">
      <span class="spinner"></span> Cargando clientes…
    </div>
  </div>
</div>

<!-- Modal nuevo cliente -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Nuevo cliente</h3>
    <div class="fi"><label>Partner (código proyecto)</label><input id="m-partner" placeholder="Ej. JMREY, EQM…"></div>
    <div class="fi"><label>Cliente</label><input id="m-cliente" placeholder="Nombre del cliente"></div>
    <div class="fi"><label>Técnico director (email)</label><input id="m-tecnico" type="email" placeholder="bg@jmrey.com"></div>
    <div class="fi"><label>€ / hora</label><input id="m-precio" type="number" step="0.01" placeholder="30"></div>
    <div class="fi"><label>% Margen</label><input id="m-margen" type="number" step="0.01" placeholder="0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCliente()">Guardar</button>
    </div>
  </div>
</div>

<footer>
  <div class="wrap">
    <div class="brand">JMREY</div>
    <div class="fnote">Portal de clientes · Supabase</div>
  </div>
</footer>

<script>
const SB_URL = 'https://bpxeyugyadcgyewrpcde.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJweGV5dWd5YWRjZ3lld3JwY2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjUwOTgsImV4cCI6MjA5NTcwMTA5OH0.0KtvmfGD3BgJLY9INw0fikxFLJ-7BWAGowC7m3eBMac';

const sb = supabase.createClient(SB_URL, SB_KEY);
let clientes = [];
let currentView = 'cards';
let listFilters = {partner:'',cliente:'',tecnico:''};


// Map de partner+cliente → página HTML del cliente
const CLIENT_PAGES = {
  'JMREY|GRUPO SICORE': 'gruposicore.html',
};

function clientePage(c){
  return CLIENT_PAGES[`${c.partner}|${c.cliente}`] || null;
}

async function loadClientes(){
  const {data, error} = await sb.from('clientes').select('*').order('partner').order('cliente');
  if(error){ showError(error.message); return; }
  clientes = data || [];
  render();
}

function setView(v){
  currentView = v;
  document.getElementById('btn-cards').classList.toggle('active', v==='cards');
  document.getElementById('btn-list').classList.toggle('active',  v==='list');
  render();
}

function render(){
  if(currentView === 'list') renderList();
  else renderCards();
}

function renderList(){
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  document.getElementById('grid').style.display = '';
  const filtered = clientes.filter(c =>
    (c.partner||'').toLowerCase().includes(q) ||
    (c.cliente||'').toLowerCase().includes(q) ||
    (c.tecnico||'').toLowerCase().includes(q)
  );
  if(!filtered.length){
    grid.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><p>Sin resultados</p></div>`;
    return;
  }
  grid.style.display = 'block';
  grid.innerHTML = `<table class="list-table">
    <thead>
      <tr>
        <th>Partner</th><th>Cliente</th><th>Técnico director</th>
        <th class="r">€/hora</th><th class="r">% Margen</th><th>Ficha</th>
      </tr>
      <tr class="filter-row-list">
        <th><input placeholder="…" oninput="listFilters.partner=this.value.toLowerCase();renderList()"></th>
        <th><input placeholder="…" oninput="listFilters.cliente=this.value.toLowerCase();renderList()"></th>
        <th><input placeholder="…" oninput="listFilters.tecnico=this.value.toLowerCase();renderList()"></th>
        <th></th><th></th><th></th>
      </tr>
    </thead>
    <tbody>
      ${filtered
        .filter(c =>
          (c.partner||'').toLowerCase().includes(listFilters.partner) &&
          (c.cliente||'').toLowerCase().includes(listFilters.cliente) &&
          (c.tecnico||'').toLowerCase().includes(listFilters.tecnico)
        )
        .map(c => {
          const page = clientePage(c);
          return `<tr>
            <td>${esc(c.partner||'—')}</td>
            <td><strong>${esc(c.cliente||'—')}</strong></td>
            <td>${esc(c.tecnico||'—')}</td>
            <td class="r">${c.precio ? c.precio+' €' : '—'}</td>
            <td class="r">${c.margen ? c.margen+'%' : '—'}</td>
            <td class="link-cell">${page ? `<a href="${page}">Ver ficha →</a>` : '—'}</td>
          </tr>`;
        }).join('')}
    </tbody>
  </table>`;
}

function renderCards(){
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  document.getElementById('grid').style.display = '';
  const filtered = clientes.filter(c =>
    (c.partner||'').toLowerCase().includes(q) ||
    (c.cliente||'').toLowerCase().includes(q) ||
    (c.tecnico||'').toLowerCase().includes(q)
  );
  if(!filtered.length){
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1;">
      <div class="icon">🔍</div>
      <p>No se encontraron clientes${q?' para "'+q+'"':''}</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(c => {
    const page = clientePage(c);
    const href = page ? `href="${page}"` : 'href="#" onclick="return false"';
    const arrow = page ? '→' : '<span style="font-size:12px;color:var(--fg-4)">Sin ficha</span>';
    return `<a class="client-card" ${href}>
      <div class="card-icon">🏢</div>
      <div class="card-eyebrow">${esc(c.partner||'—')}</div>
      <div class="card-name">${esc(c.cliente||'—')}</div>
      <div class="card-meta">
        ${c.tecnico ? `<span>👤 ${esc(c.tecnico)}</span>` : ''}
        ${c.precio ? `<span>💶 ${c.precio} €/h</span>` : ''}
        ${c.margen ? `<span>📊 ${c.margen}% margen</span>` : ''}
      </div>
      <div class="card-arrow">${arrow}</div>
    </a>`;
  }).join('');
}

function showError(msg){
  document.getElementById('grid').innerHTML = `<div class="state-msg" style="grid-column:1/-1;">
    <div class="icon">⚠️</div><p>Error cargando clientes: ${esc(msg)}</p>
  </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Modal
function openModal(){
  ['m-partner','m-cliente','m-tecnico','m-precio','m-margen'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('m-partner').focus();
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

async function saveCliente(){
  const o = {
    partner: document.getElementById('m-partner').value.trim().toUpperCase(),
    cliente: document.getElementById('m-cliente').value.trim().toUpperCase(),
    tecnico: document.getElementById('m-tecnico').value.trim(),
    precio:  parseFloat(document.getElementById('m-precio').value)||0,
    margen:  parseFloat(document.getElementById('m-margen').value)||0,
  };
  if(!o.partner||!o.cliente){ alert('Partner y Cliente son obligatorios'); return; }
  const {error} = await sb.from('clientes').insert(o);
  if(error){ alert('Error: '+error.message); return; }
  closeModal();
  await loadClientes();
}

loadClientes();
</script>
</body>
</html>
