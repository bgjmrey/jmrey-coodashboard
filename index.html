<!DOCTYPE html>
<html lang="es">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMREY · Cuadro de Mando BC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#0E1F3D;--navy-800:#14274A;--navy-700:#1E3157;--navy-600:#2A3F66;
  --gold-700:#A47535;--gold-600:#B6884A;--gold-300:#D7B27A;
  --ivory-50:#FAF7F2;--ivory-100:#F3F0EA;--ivory-200:#ECE7DD;--ivory-300:#E2D9C6;
  --ink-900:#14171C;--ink-500:#5A5A5A;--ink-400:#7A7669;--ink-200:#D9D2C2;
  --bg:var(--ivory-100);--bg-e:var(--ivory-50);--bg-card:#FFFFFF;--bg-dark:var(--navy-900);
  --fg-1:var(--navy-900);--fg-2:var(--ink-900);--fg-3:var(--ink-500);--fg-4:var(--ink-400);
  --fg-d:#F4ECE0;--fg-d2:#B6884A;
  --accent:var(--gold-600);--border:var(--ink-200);--border-s:var(--ivory-300);
  --ff-serif:'Cormorant Garamond',Georgia,serif;--ff-sans:'Manrope',system-ui,sans-serif;
}
*{box-sizing:border-box} body{margin:0;font-family:var(--ff-sans);background:var(--bg);color:var(--fg-2)}
.hdr,.nav,footer{padding:16px 24px}.hdr,footer{background:var(--bg-dark);color:var(--fg-d)}.nav{background:var(--navy-800)}
.sec{max-width:1100px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid var(--border-s);border-radius:10px;padding:24px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-dark);color:var(--fg-d);padding:12px 18px;border-radius:10px;opacity:0;transform:translateY(10px);transition:.2s}.toast.on{opacity:1;transform:none}
.muted{color:var(--ink-500)} .ok{color:#2e7d32} .err{color:#c62828}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="hdr"><strong>JMREY</strong> · Cuadro de Mando BC</header>
<nav class="nav">Carga prioritaria desde Supabase</nav>
<section class="sec">
  <div class="card">
    <h1 style="margin-top:0">Estado de carga</h1>
    <p id="status" class="muted">Inicializando…</p>
    <pre id="summary" style="white-space:pre-wrap"></pre>
  </div>
</section>
<footer>JMREY Business</footer>
<div class="toast" id="toast"></div>
<script>
const MASTER = window.MASTER || { clientes: [], tecnicos: [] };
const SEED = window.SEED || { servicios: [], valoraciones: [] };

const SUPABASE_PLACEHOLDER_URL = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_PLACEHOLDER_KEY = 'YOUR_SUPABASE_ANON_KEY';
const SUPABASE_URL = 'https://bpxeyugyadcgyewrpcde.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-MbTS5o7pn2zqWiaY0UJ0A_zHhKAVKv';
const SUPABASE_TABLES = {
  servicios: 'servicios',
  valoraciones: 'valoraciones',
  clientes: 'clientes',
  tecnicos: 'tecnicos',
};

function ls(k,fb){try{const v=localStorage.getItem('jmr_'+k);return v?JSON.parse(v):fb;}catch{return fb;}}
function ssLocal(k,v){try{localStorage.setItem('jmr_'+k,JSON.stringify(v));}catch{}}
let _sbClient = null;
let _sbWarned = false;
let _sbLibWarned = false;

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._timer);
  el._timer = setTimeout(()=>el.classList.remove('on'), 2200);
}
function setStatus(msg, cls='muted'){
  const el = document.getElementById('status');
  el.className = cls;
  el.textContent = msg;
}
function setSummary(obj){
  document.getElementById('summary').textContent = JSON.stringify(obj, null, 2);
}
function hasSupabaseConfig(){
  return !!SUPABASE_URL && !!SUPABASE_ANON_KEY
    && SUPABASE_URL !== SUPABASE_PLACEHOLDER_URL
    && SUPABASE_ANON_KEY !== SUPABASE_PLACEHOLDER_KEY;
}
function getSupabaseClient(){
  if(_sbClient) return _sbClient;
  if(!window.supabase?.createClient){
    if(!_sbLibWarned){
      _sbLibWarned = true;
      console.error('Supabase SDK no cargado');
    }
    return null;
  }
  if(!hasSupabaseConfig()) return null;
  _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return _sbClient;
}
function notifySupabaseFallbackOnce(reason){
  if(_sbWarned) return;
  _sbWarned = true;
  toast(reason || 'Usando datos locales');
}

async function loadCollectionFromSupabase(collection, fallbackRows){
  const client = getSupabaseClient();
  if(!client) return fallbackRows;
  const table = SUPABASE_TABLES[collection] || collection;
  const { data, error } = await client.from(table).select('*');
  if(error) throw error;
  if(Array.isArray(data) && data.length >= 0) return data;
  return fallbackRows;
}

let DB = {
  servicios: [],
  valoraciones: [],
  clientes: [],
  tecnicos: [],
};

async function hydrateDBFromSupabase(){
  const fallback = {
    servicios: ls('svc', SEED.servicios || []),
    valoraciones: ls('val', SEED.valoraciones || []),
    clientes: ls('cli', MASTER.clientes || []),
    tecnicos: ls('tec', MASTER.tecnicos || []),
  };

  if(!hasSupabaseConfig()){
    DB = { ...fallback };
    notifySupabaseFallbackOnce('Supabase no configurado; usando localStorage/seed');
    return { source: 'fallback', db: DB };
  }

  try{
    const [servicios, valoraciones, clientes, tecnicos] = await Promise.all([
      loadCollectionFromSupabase('servicios', fallback.servicios),
      loadCollectionFromSupabase('valoraciones', fallback.valoraciones),
      loadCollectionFromSupabase('clientes', fallback.clientes),
      loadCollectionFromSupabase('tecnicos', fallback.tecnicos),
    ]);

    DB = { servicios, valoraciones, clientes, tecnicos };

    ssLocal('svc', DB.servicios);
    ssLocal('val', DB.valoraciones);
    ssLocal('cli', DB.clientes);
    ssLocal('tec', DB.tecnicos);

    return { source: 'supabase', db: DB };
  }catch(err){
    console.error('Supabase load error', err);
    DB = { ...fallback };
    notifySupabaseFallbackOnce('Error leyendo Supabase; usando localStorage/seed');
    return { source: 'fallback', db: DB, error: String(err?.message || err) };
  }
}

(async function init(){
  const result = await hydrateDBFromSupabase();
  if(result.source === 'supabase'){
    setStatus('Datos cargados desde Supabase', 'ok');
    toast('Cargado desde Supabase');
  } else {
    setStatus('Cargado desde localStorage/seed como respaldo', 'err');
  }
  setSummary({
    source: result.source,
    counts: {
      servicios: DB.servicios.length,
      valoraciones: DB.valoraciones.length,
      clientes: DB.clientes.length,
      tecnicos: DB.tecnicos.length,
    },
    error: result.error || null
  });
})();
</script>
</body>
</html>
