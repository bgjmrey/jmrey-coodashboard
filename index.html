<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMREY · Cuadro de Mando BC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#0E1F3D;--navy-800:#14274A;--navy-700:#1E3157;--navy-600:#2A3F66;
  --gold-700:#A47535;--gold-600:#B6884A;--gold-300:#D7B27A;
  --ivory-50:#FAF7F2;--ivory-100:#F3F0EA;--ivory-200:#ECE7DD;--ivory-300:#E2D9C6;
  --ink-900:#14171C;--ink-500:#5A5A5A;--ink-400:#7A7669;--ink-200:#D9D2C2;
  --bg:var(--ivory-100);--bg-e:var(--ivory-50);--bg-card:#FFFFFF;--bg-dark:var(--navy-900);
  --fg-1:var(--navy-900);--fg-2:var(--ink-900);--fg-3:var(--ink-500);--fg-4:var(--ink-400);
  --fg-d:#F4ECE0;--fg-d2:#B6884A;
  --accent:var(--gold-600);--border:var(--ink-200);--border-s:var(--ivory-300);
  --ff-serif:'Cormorant Garamond',Georgia,serif;--ff-sans:'Manrope',system-ui,sans-serif;
  --fz-h3:22px;--fz-h4:18px;--fz-b:15px;--fz-sm:13px;--fz-xs:12px;--fz-2xs:11px;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;
  --r-md:6px;--r-lg:10px;
  --sh-sm:0 2px 6px rgba(20,23,28,.05),0 1px 2px rgba(20,23,28,.04);
  --sh-md:0 8px 24px -8px rgba(20,23,28,.10);
  --max:1300px;--g:clamp(16px,3vw,48px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-sans);font-size:var(--fz-b);background:var(--bg);color:var(--fg-2);line-height:1.6;min-height:100vh;}

/* HEADER */
.hdr{background:var(--bg-dark);padding:var(--sp-4) var(--g);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);position:sticky;top:0;z-index:100;}
.hdr-brand{display:flex;align-items:baseline;gap:var(--sp-3);}
.hdr-logo{font-family:var(--ff-serif);font-size:var(--fz-h3);font-weight:600;color:var(--fg-d);}
.hdr-logo span{color:var(--accent);}
.hdr-sub{font-size:var(--fz-2xs);font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--fg-d2);}
.hdr-meta{font-size:var(--fz-sm);color:var(--fg-d2);text-align:right;}
.hdr-meta strong{color:var(--fg-d);display:block;}

/* NAV */
.nav{background:var(--navy-800);padding:0 var(--g);display:flex;gap:2px;border-bottom:2px solid var(--accent);}
.nav-tab{font-family:var(--ff-sans);font-size:var(--fz-sm);font-weight:600;padding:10px 18px;
  background:transparent;border:none;color:var(--fg-d2);cursor:pointer;transition:all 160ms;white-space:nowrap;position:relative;}
.nav-tab:hover{color:var(--fg-d);}
.nav-tab.active{color:var(--fg-d);background:var(--bg-dark);}
.nav-tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent);}

/* SECTIONS */
.sec{display:none;max-width:var(--max);margin:0 auto;padding:var(--sp-5) var(--g);}
.sec.active{display:block;}
#sec-servicios,#sec-valoraciones{max-width:100%;padding-left:var(--sp-4);padding-right:var(--sp-4);}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="display:flex;position:fixed;inset:0;background:var(--bg-dark);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-5);">
  <div style="text-align:center;margin-bottom:var(--sp-4);">
    <div style="font-family:var(--ff-serif);font-size:42px;font-weight:600;color:var(--fg-d);">JM<span style="color:var(--accent)">REY</span></div>
    <div style="font-size:var(--fz-xs);font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--fg-d2);margin-top:4px;">Cuadro de Mando · Dpto. BC</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;align-items:center;">
    <button id="btn-login" onclick="msalLogin()" style="
      font-family:var(--ff-sans);font-size:var(--fz-b);font-weight:600;
      background:#fff;color:#1a1a1a;border:none;border-radius:var(--r-md);
      padding:12px 28px;cursor:pointer;display:flex;align-items:center;gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);transition:box-shadow 160ms;width:260px;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Iniciar sesión con Microsoft
    </button>
    <button onclick="googleLogin()" style="
      font-family:var(--ff-sans);font-size:var(--fz-b);font-weight:600;
      background:#fff;color:#1a1a1a;border:none;border-radius:var(--r-md);
      padding:12px 28px;cursor:pointer;display:flex;align-items:center;gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);transition:box-shadow 160ms;width:260px;justify-content:center;">
      <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Iniciar sesión con Google
    </button>
  </div>
  <div id="login-error" style="color:#e07070;font-size:var(--fz-sm);display:none;margin-top:8px;text-align:center;max-width:320px;"></div>
</div>

<div id="app-content" style="display:none"><header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">JM<span>REY</span></span>
    <span class="hdr-sub">Cuadro de Mando · Dpto. BC</span>
  </div>
  <div class="hdr-meta"><strong>Borja González</strong><span>bg@jmrey.com</span></div>
</header>

<nav class="nav">
  <button class="nav-tab active" data-sec="kpis">📊 KPIs</button>
  <button class="nav-tab" data-sec="servicios">📋 Servicios</button>
  <button class="nav-tab" data-sec="valoraciones">⭐ Valoraciones</button>
  <button class="nav-tab" data-sec="clientes">🏢 Clientes</button>
</nav>

<section id="sec-kpis" class="sec active">
  <h2>Dashboard restaurado</h2>
  <p>Se ha conservado la estructura principal y el login arreglado.</p>
</section>

<section id="sec-servicios" class="sec"></section>
<section id="sec-valoraciones" class="sec"></section>
<section id="sec-clientes" class="sec"></section>

<footer><div class="fin">
  <span class="fb">JMREY Business</span>
  <span class="fm" id="footer-lbl">Cuadro de Mando · Departamento BC</span>
</div></footer>
</div>

<script>
var _msalApp = null;
var ALLOWED_USERS = ['bg@jmrey.com'];
var GOOGLE_CLIENT_ID = '';
var GOOGLE_REDIRECT_URI = 'https://bgjmrey.github.io/jmrey-coodashboard/';

function showLoginError(message){
  var el = document.getElementById('login-error');
  if(!el) return;
  el.textContent = message || 'Error de autenticación';
  el.style.display = 'block';
}

function clearLoginError(){
  var el = document.getElementById('login-error');
  if(!el) return;
  el.textContent = '';
  el.style.display = 'none';
}

function normalizeEmail(value){
  return String(value || '').toLowerCase().trim();
}

function getAccountEmail(account){
  return normalizeEmail(
    account?.username ||
    account?.idTokenClaims?.preferred_username ||
    account?.idTokenClaims?.email ||
    account?.idTokenClaims?.upn ||
    ''
  );
}

function showApp(account){
  var email = getAccountEmail(account);
  var allowed = ALLOWED_USERS.map(normalizeEmail).filter(Boolean);
  if(allowed.length > 0 && allowed.indexOf(email) === -1){
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('app-content').style.display = 'none';
    showLoginError('Acceso denegado: ' + (email || 'usuario sin email') + ' no tiene permisos.');
    if(_msalApp && account){ try{ _msalApp.logoutPopup({account: account}); }catch(e){} }
    return;
  }
  clearLoginError();
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';
  document.querySelector('.hdr-meta strong').textContent = account?.name || email || 'Usuario';
  document.querySelector('.hdr-meta span').textContent = email;
}

function handleGoogleCallback(){
  if(!window.location.hash) return false;
  var hash = new URLSearchParams(window.location.hash.substring(1));
  var accessToken = hash.get('access_token');
  if(!accessToken) return false;
  clearLoginError();
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken }})
    .then(function(r){ if(!r.ok) throw new Error('No se pudo obtener el perfil de Google'); return r.json(); })
    .then(function(profile){
      showApp({ name: profile.name, username: profile.email, idTokenClaims: { email: profile.email, preferred_username: profile.email } });
      history.replaceState({}, document.title, window.location.pathname + window.location.search);
    })
    .catch(function(e){ showLoginError('Google login error: ' + (e.message || e)); });
  return true;
}

function googleLogin(){
  clearLoginError();
  if(!GOOGLE_CLIENT_ID){
    showLoginError('Login con Google no configurado: falta GOOGLE_CLIENT_ID.');
    return;
  }
  var scope = 'openid email profile';
  var url = 'https://accounts.google.com/o/oauth2/v2/auth'
    + '?client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(GOOGLE_REDIRECT_URI)
    + '&response_type=token'
    + '&scope=' + encodeURIComponent(scope)
    + '&prompt=' + encodeURIComponent('select_account');
  window.location.href = url;
}

function msalLogin(){
  clearLoginError();
  if(!_msalApp){
    showLoginError('Microsoft Auth no está inicializado todavía. Recarga la página.');
    return;
  }
  _msalApp.loginPopup({ scopes: ['User.Read'], prompt: 'select_account' })
    .then(function(resp){
      var account = resp && resp.account ? resp.account : _msalApp.getActiveAccount() || _msalApp.getAllAccounts()[0];
      if(account){
        _msalApp.setActiveAccount(account);
        showApp(account);
      } else {
        showLoginError('Login correcto, pero no se pudo recuperar la cuenta.');
      }
    })
    .catch(function(e){
      var msg = e ? (e.message || String(e)) : '';
      if(msg.indexOf('user_cancelled') < 0){
        showLoginError('Error Microsoft: ' + msg);
      }
    });
}

function initMsalWhenReady(){
  if(typeof msal === 'undefined'){
    showLoginError('No se ha cargado la librería de Microsoft.');
    return;
  }
  var config = {
    auth: {
      clientId: '8599adae-833a-4eab-8123-d78de159759f',
      authority: 'https://login.microsoftonline.com/common',
      knownAuthorities: ['login.microsoftonline.com'],
      redirectUri: 'https://bgjmrey.github.io/jmrey-coodashboard/'
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
  };
  try {
    _msalApp = new msal.PublicClientApplication(config);
    var accounts = _msalApp.getAllAccounts();
    if(accounts.length > 0){
      _msalApp.setActiveAccount(accounts[0]);
      showApp(accounts[0]);
    }
  } catch(e){
    console.error('MSAL init', e);
    showLoginError('Error al cargar autenticación Microsoft: ' + (e.message || e));
  }
}

document.addEventListener('DOMContentLoaded', function(){
  handleGoogleCallback();
  initMsalWhenReady();
});
</script>
</body>
</html>
